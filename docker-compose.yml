services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaign_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/campaign_db
      JWT_SECRET: ${JWT_SECRET:-changeme}
      REFRESH_SECRET: ${REFRESH_SECRET:-changeme-refresh}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
